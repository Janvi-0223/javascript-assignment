<!DOCTYPE html>
<html>
<body>

<h2>Student Registration Form</h2>

Name: <input type="text" id="name"><br><br>

Email: <input type="text" id="email"><br><br>

Mobile: <input type="text" id="mobile"><br><br>

Password: <input type="password" id="pass"><br><br>

Confirm Password: <input type="password" id="cpass"><br><br>

Gender:
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<br><br>

City:
<select id="city">
    <option value="">Select City</option>
    <option>Nagpur</option>
    <option>Pune</option>
    <option>Mumbai</option>
</select>
<br><br>

<button onclick="check()">Submit</button>

<p id="demo"></p>

<script>

function check(){

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let mobile = document.getElementById("mobile").value;
    let pass = document.getElementById("pass").value;
    let cpass = document.getElementById("cpass").value;
    let city = document.getElementById("city").value;

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    let mobilePattern = /^[0-9]{10}$/;

    if(name=="" || email=="" || mobile=="" || pass=="" || cpass=="" || city==""){
        alert("Fill all fields");
    }
    else if(!email.match(emailPattern)){
        alert("Invalid Email");
    }
    else if(!mobile.match(mobilePattern)){
        alert("Mobile must be 10 digits");
    }
    else if(pass.length<8){
        alert("Password must be at least 8 characters");
    }
    else if(pass!=cpass){
        alert("Passwords do not match");
    }
    else{
        document.getElementById("demo").innerHTML="Registration Successful";
    }

}

</script>

</body>
</html>
